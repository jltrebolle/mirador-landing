<script>
/* ── DATA ───────────────────────────────────────────────────── */
const articles = [
  {
    id: 'irpf',
    isLatest: true,
    category: 'Planificación',
    date: '10 mar 2026',
    readTime: '5 min',
    title: 'IRPF 2025-2026: desgravaciones que no conoces',
    excerpt: 'Cada primavera, millones de españoles confirman el borrador sin revisarlo. El problema es que ese número casi nunca es el correcto. Hacienda no se molesta en recordarte lo que puedes deducirte.',
    body: `
      <p>Cada primavera, millones de españoles abren el borrador de la renta, miran el número de abajo, dicen «bueno, podría ser peor» y le dan a confirmar. Fin del proceso.</p>
      <p>El problema es que ese número casi nunca es el correcto. O mejor dicho: casi nunca es el más bajo que podrías conseguir. Porque Hacienda te calcula lo que le debes, pero no se molesta en recordarte todo lo que puedes deducirte. Eso corre de tu cuenta. Y si no lo sabes, lo pagas.</p>
      <p>La campaña de la Renta 2025 —que se presenta en 2026— trae cambios que merece la pena conocer. Pero más allá de las novedades, hay un puñado de deducciones que llevan años ahí, esperando pacientemente a que alguien las descubra. Vamos a repasarlas.</p>

      <h2>Primero: la diferencia entre deducir y desgravar (sí, importa)</h2>
      <p>Antes de entrar en materia, aclaremos algo que genera confusión permanente. No es lo mismo una deducción que una desgravación, aunque se usen como sinónimos en la conversación de barra de bar.</p>
      <p>Una <strong>desgravación</strong> reduce la base imponible. Es decir, baja la cifra sobre la que se calcula tu impuesto. Si ganas 30.000 € y desgravas 1.500 € por un plan de pensiones, tributas como si hubieras ganado 28.500 €. El ahorro real depende de tu tramo impositivo.</p>
      <p>Una <strong>deducción</strong> se aplica directamente sobre la cuota, sobre lo que te toca pagar. Si tu cuota es de 4.000 € y tienes una deducción de 1.200 €, pagas 2.800 €. Euro por euro.</p>
      <p>¿Por qué importa esto? Porque una deducción de 500 € siempre te ahorra 500 €. Una desgravación de 500 € te ahorra entre 95 € y 235 €, dependiendo de cuánto ganes. Cuando alguien te diga que «el plan de pensiones desgrava 1.500 €», no significa que te devuelvan 1.500 €. Significa que tributas por 1.500 € menos, que es bastante diferente.</p>
      <p>Con eso claro, entremos en las que probablemente no estás aplicando.</p>

      <h2>1. Donativos a ONG: la deducción más generosa que casi nadie maximiza</h2>
      <p>Si donas a una ONG, una fundación o una asociación de utilidad pública acogida a la Ley 49/2002, los porcentajes de deducción son sorprendentemente altos.</p>
      <p>En la Renta 2025, los números son estos: los primeros 250 € donados se deducen al <strong>80 %</strong>. Es decir, donas 250 € y recuperas 200 € en la declaración. El coste real de tu donación son 50 €. A partir de esos 250 €, la deducción es del <strong>40 %</strong> sobre el resto.</p>
      <p>Pero aquí viene lo que poca gente sabe: si llevas tres años consecutivos donando a la misma entidad una cantidad igual o superior a la del año anterior, ese 40 % sube al 45 %. Y si tus donativos van destinados a actividades prioritarias de mecenazgo —universidades públicas, el CSIC, programas contra la violencia de género, el Museo del Prado, entre otros—, los porcentajes suben otros 5 puntos.</p>
      <div class="example-box">
        <p><strong>Un ejemplo concreto.</strong> Si donas 25 € al mes a una ONG, son 300 € al año. Tu deducción: 200 € por los primeros 250 € (al 80 %) + 20 € por los 50 € restantes (al 40 %). Total recuperado: 220 €. Tu donación de 300 € te ha costado realmente 80 €.</p>
        <p>Para que funcione, necesitas el certificado de la entidad receptora. La mayoría de las ONG lo envían automáticamente en enero. Si no te ha llegado, pídelo.</p>
      </div>

      <h2>2. La nueva deducción de 340 € para rentas bajas</h2>
      <p>Esta es una novedad del ejercicio 2025 que mucha gente no conoce porque no se ha publicitado demasiado. Si tus rendimientos netos del trabajo no superan los <strong>16.576 € brutos anuales</strong>, puedes aplicar una deducción en la cuota de hasta 340 €.</p>
      <p>El objetivo es compensar el efecto fiscal de las subidas del Salario Mínimo Interprofesional. La deducción es máxima en los 16.576 € y va reduciéndose progresivamente hasta desaparecer en torno a los 18.276 €. No hay que pedirla: en teoría aparece en el borrador. Pero «en teoría» y «en la práctica» no siempre coinciden con Hacienda. Revísalo.</p>

      <h2>3. Eficiencia energética de tu vivienda: hasta un 60 % de deducción</h2>
      <p>Si en 2025 hiciste obras para mejorar la eficiencia energética de tu vivienda, hay tres modalidades de deducción que conviene repasar.</p>
      <ul>
        <li><strong>20 % de deducción</strong> cuando las obras reducen la demanda de calefacción o refrigeración al menos un 7 %. Base máxima: 5.000 €.</li>
        <li><strong>40 % de deducción</strong> si consigues reducir el consumo de energía primaria no renovable al menos un 30 %. Tope: 7.500 €.</li>
        <li><strong>60 % de deducción</strong> para edificios residenciales completos. Base de hasta 5.000 € anuales por vivienda, acumulable en un máximo de 15.000 €.</li>
      </ul>
      <p>Hablamos de cifras importantes. Si cambiaste ventanas, instalaste aerotermia o mejoraste el aislamiento de tu casa, no dejes de comprobar si tienes derecho. Necesitas dos certificados de eficiencia energética —uno anterior y otro posterior a la obra— que demuestren la mejora. Y la obra tiene que haberse completado antes del 31 de diciembre de 2025.</p>

      <h2>4. Inversión en empresas de nueva creación</h2>
      <p>Si durante 2025 invertiste en una startup o empresa de reciente creación, puedes deducirte parte de la inversión. La deducción permite restar de la cuota un porcentaje de las cantidades invertidas en la suscripción de acciones o participaciones de empresas nuevas o con pocos años de actividad.</p>
      <p>No es una deducción para grandes inversores. Está pensada para incentivar que personas normales pongan dinero en proyectos empresariales emergentes. Lo que sí requiere es que la empresa cumpla ciertos criterios: ser de nueva creación o reciente, no cotizar en un mercado organizado, y que la inversión se mantenga durante un período mínimo. Si participaste en una ronda de financiación o entraste como socio en un proyecto, revisa si cumples los requisitos.</p>

      <h2>5. Planes de pensiones: la desgravación que conoces pero probablemente no aprovechas bien</h2>
      <p>Esta la «conoce» todo el mundo. Pero conocerla y aprovecharla bien son cosas distintas.</p>
      <p>Las aportaciones a planes de pensiones individuales permiten reducir tu base imponible hasta <strong>1.500 € al año</strong>. Si tu empresa ofrece un plan de empleo, el límite adicional sube a 8.500 €. Para autónomos con planes simplificados, el límite extra es de 4.250 €.</p>
      <p>Lo que mucha gente no sabe es que la desgravación tiene tope doble: no puedes desgravar más de 1.500 € ni más del 30 % de tus rendimientos netos del trabajo. Y lo que casi nadie calcula es el ahorro real. Si estás en un tramo marginal del 30 %, desgravar 1.500 € te ahorra 450 € en impuestos. Si estás en el tramo del 45 %, te ahorra 675 €. Cuanto más alto tu tramo, más te interesa el plan de pensiones desde el punto de vista fiscal.</p>
      <p><strong>Novedad en 2025:</strong> ya puedes rescatar anticipadamente los derechos consolidados de tu plan de pensiones si llevan al menos diez años. Un cambio importante para quienes aportaron hace años y necesitan liquidez antes de la jubilación.</p>

      <h2>6. Vehículo eléctrico: el 15 % que caduca</h2>
      <p>Si compraste un coche eléctrico enchufable o de pila de combustible en 2025, puedes deducirte el <strong>15 %</strong> del valor de adquisición, con una base máxima de 20.000 €. Lo mismo aplica si instalaste un punto de recarga en tu vivienda.</p>
      <p>El matiz relevante: el vehículo tiene que haberse matriculado por primera vez en España antes del 31 de diciembre de 2025. Y hay que descontar de la base las subvenciones o ayudas públicas que hayas recibido —Plan MOVES, por ejemplo—.</p>

/* ── RENDER CARDS ───────────────────────────────────────────── */
function renderCards(activeId) {
  const container = document.getElementById('article-cards');
  container.innerHTML = articles.map(a => `
    <button class="article-card ${a.id === activeId ? 'active' : ''}" onclick="loadArticle('${a.id}')">
      <span class="card-badge">${a.category}</span>
      <div class="card-title">${a.title}</div>
      <div class="card-excerpt">${a.excerpt}</div>
      <div class="card-meta">
        <span>${a.date}</span>
        <span class="card-meta-dot"></span>
        <span>${a.readTime} lectura</span>
      </div>
    </button>
  `).join('');
}

/* ── RENDER ARTICLE ─────────────────────────────────────────── */
function renderArticle(article) {
  const area = document.getElementById('article-area');
  area.innerHTML = `
    <div class="article-header">
      <div class="article-badge">
        <span class="badge-dot"></span>
        ${article.category}
        ${article.isLatest ? '<span class="article-latest-badge">Último artículo</span>' : ''}
      </div>
      <h1 class="article-title">${article.title}</h1>
      <div class="article-meta">
        <span>${article.date}</span>
        <span class="meta-sep"></span>
        <span>${article.readTime} de lectura</span>
      </div>
    </div>
    <div class="article-body">${article.body}</div>
  `;
  area.scrollTop = 0;
}

/* ── LOAD ARTICLE ───────────────────────────────────────────── */
function loadArticle(id) {
  const article = articles.find(a => a.id === id);
  if (!article) return;
  const area = document.getElementById('article-area');
  area.classList.add('fading');
  setTimeout(() => {
    renderArticle(article);
    renderCards(id);
    area.classList.remove('fading');
    updateProgress();
  }, 120);
}

/* ── READING PROGRESS ───────────────────────────────────────── */
function updateProgress() {
  const bar = document.getElementById('progress-bar');
  const area = document.getElementById('article-area');
  const scrollable = area.scrollHeight - area.clientHeight;
  const pct = scrollable > 0 ? (area.scrollTop / scrollable) * 100 : 0;
  bar.style.width = Math.min(pct, 100) + '%';
}

document.getElementById('article-area').addEventListener('scroll', updateProgress);

/* ── INIT ───────────────────────────────────────────────────── */
renderCards('irpf');
renderArticle(articles[0]);
</script>
</body>
